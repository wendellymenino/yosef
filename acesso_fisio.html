<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yosef — Fisioterapeuta</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: linear-gradient(135deg, #0d131f 0%, #151828 50%, #1b1222 100%);
            --surface: rgba(26, 29, 39, 0.55);
            --surface2: rgba(34, 38, 58, 0.5);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #4f8ef7;
            --accent2: #38d9a9;
            --accent3: #ffa94d;
            --accent4: #f06595;
            --text: #e8eaf0;
            --text2: #8b90a7;
            --danger: #f06595;
            --success: #38d9a9;
            --radius: 14px;
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ── TOPBAR ── */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(26, 29, 39, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, #4f8ef7, #38d9a9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .brand-name {
            font-weight: 600;
            font-size: 15px;
        }

        .brand-sub {
            font-size: 11px;
            color: var(--text2);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-badge {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 12px;
            font-size: 12px;
            color: var(--text2);
        }

        .user-badge span {
            color: var(--text);
            font-weight: 500;
        }

        .btn-logout {
            background: rgba(240, 101, 149, 0.1);
            border: 1px solid rgba(240, 101, 149, 0.3);
            color: var(--danger);
            border-radius: 8px;
            padding: 6px 14px;
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: background .2s;
        }

        .btn-logout:hover {
            background: rgba(240, 101, 149, 0.2);
        }

        /* ── CONTENT ── */
        .content {
            max-width: 860px;
            margin: 0 auto;
            padding: 24px 20px;
        }

        /* ── TABS ── */
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 9px 20px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text2);
            transition: all .2s;
        }

        .tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .tab:hover:not(.active) {
            color: var(--text);
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        /* ── CARD ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 24px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 18px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: .6px;
        }

        /* ── FORM GRID ── */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-grid.cols3 {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .col-span-2 {
            grid-column: span 2;
        }

        .field label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 6px;
        }

        .field input,
        .field select,
        .field textarea {
            width: 100%;
            padding: 9px 12px;
            background: rgba(34, 38, 58, 0.5);
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            outline: none;
            transition: border-color .2s;
        }

        .field input:focus,
        .field select:focus,
        .field textarea:focus {
            border-color: var(--accent);
        }

        .field select option {
            background: #1a1d27;
        }

        .field textarea {
            resize: vertical;
            min-height: 72px;
        }

        .divider {
            grid-column: span 2;
            border: none;
            border-top: 1px solid var(--border);
            margin: 4px 0;
        }

        /* ── BUTTONS ── */
        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 18px;
        }

        .btn {
            padding: 10px 22px;
            border-radius: 10px;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: opacity .2s, transform .1s;
        }

        .btn:active {
            transform: scale(.98);
        }

        .btn-primary {
            background: var(--accent);
            color: #fff;
        }

        .btn-secondary {
            background: var(--surface2);
            color: var(--text2);
            border: 1px solid var(--border);
        }

        .btn-danger {
            background: rgba(240, 101, 149, 0.12);
            color: var(--danger);
            border: 1px solid rgba(240, 101, 149, 0.3);
        }

        .btn:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 999;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 18px;
            font-size: 13px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s;
        }

        .toast.show {
            opacity: 1;
        }

        .toast.ok {
            border-color: rgba(56, 217, 169, .4);
            color: var(--success);
        }

        .toast.err {
            border-color: rgba(240, 101, 149, .4);
            color: var(--danger);
        }

        /* ── HISTÓRICO ── */
        .hist-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .hist-search {
            flex: 1;
            min-width: 180px;
            padding: 8px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 9px;
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
            outline: none;
        }

        .hist-search:focus {
            border-color: var(--accent);
        }

        .reg-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            transition: border-color .2s;
        }

        .reg-card:hover {
            border-color: rgba(79, 142, 247, .3);
        }

        .reg-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .reg-name {
            font-weight: 600;
            font-size: 14px;
        }

        .reg-meta {
            font-size: 12px;
            color: var(--text2);
        }

        .reg-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        .chip {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            background: rgba(79, 142, 247, .12);
            color: var(--accent);
            border: 1px solid rgba(79, 142, 247, .2);
        }

        .chip.green {
            background: rgba(56, 217, 169, .1);
            color: var(--accent2);
            border-color: rgba(56, 217, 169, .2);
        }

        .chip.orange {
            background: rgba(255, 169, 77, .1);
            color: var(--accent3);
            border-color: rgba(255, 169, 77, .2);
        }

        .chip.pink {
            background: rgba(240, 101, 149, .1);
            color: var(--accent4);
            border-color: rgba(240, 101, 149, .2);
        }

        .chip.gray {
            background: rgba(139, 144, 167, .1);
            color: var(--text2);
            border-color: rgba(139, 144, 167, .2);
        }

        .reg-actions {
            display: flex;
            gap: 6px;
        }

        .btn-sm {
            padding: 5px 12px;
            font-size: 11px;
            border-radius: 7px;
        }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text2);
        }

        .empty-state .ico {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 13px;
        }

        .loading {
            text-align: center;
            padding: 32px;
            color: var(--text2);
            font-size: 13px;
        }

        /* ── MODAL EDIÇÃO ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, .6);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: rgba(22, 25, 36, .95);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px;
            width: 100%;
            max-width: 640px;
            max-height: 90vh;
            overflow-y: auto;
            margin: 16px;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            font-size: 15px;
            font-weight: 600;
        }

        .btn-close {
            background: none;
            border: none;
            color: var(--text2);
            font-size: 20px;
            cursor: pointer;
            line-height: 1;
        }

        .btn-close:hover {
            color: var(--text);
        }

        @media(max-width:600px) {

            .form-grid,
            .form-grid.cols3 {
                grid-template-columns: 1fr;
            }

            .col-span-2 {
                grid-column: span 1;
            }

            .divider {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>

    <!-- TOPBAR -->
    <div class="topbar">
        <div class="topbar-brand">
            <div class="brand-icon">🏥</div>
            <div>
                <div class="brand-name">Yosef</div>
                <div class="brand-sub">Painel do Fisioterapeuta</div>
            </div>
        </div>
        <div class="topbar-right">
            <div class="user-badge">Olá, <span id="nomeUsuario">—</span></div>
            <button class="btn-logout" onclick="sair()">Sair</button>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <!-- TABS -->
        <div class="tabs">
            <button class="tab active" onclick="trocarTab('nova')">＋ Nova avaliação</button>
            <button class="tab" onclick="trocarTab('historico')">📋 Meu histórico</button>
        </div>

        <!-- PAINEL: NOVA AVALIAÇÃO -->
        <div class="panel active" id="tab-nova">
            <div class="card">
                <div class="card-title">Dados do paciente</div>
                <div class="form-grid">
                    <div class="field">
                        <label>Nome do paciente *</label>
                        <input type="text" id="f-paciente" placeholder="Nome completo">
                    </div>
                    <div class="field">
                        <label>Prontuário</label>
                        <input type="text" id="f-prontuario" placeholder="Nº do prontuário">
                    </div>
                    <div class="field">
                        <label>Posto / Setor</label>
                        <input type="text" id="f-posto" placeholder="Ex: UTI Adulto">
                    </div>
                    <div class="field">
                        <label>Leito</label>
                        <input type="text" id="f-leito" placeholder="Ex: 12A">
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">Registro da avaliação</div>
                <div class="form-grid">
                    <div class="field">
                        <label>Data *</label>
                        <input type="date" id="f-data">
                    </div>
                    <div class="field">
                        <label>Tipo de atendimento</label>
                        <select id="f-tipo">
                            <option value="">— Selecione —</option>
                            <option>Avaliação Inicial</option>
                            <option>Reavaliação</option>
                            <option>Alta da fisioterapia</option>
                            <option>Óbito</option>
                            <option>Transferência</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Status do paciente</label>
                        <select id="f-status">
                            <option value="">— Selecione —</option>
                            <option>Em acompanhamento</option>
                            <option>Alta hospitalar</option>
                            <option>Alta da fisioterapia</option>
                            <option>Óbito</option>
                            <option>Transferência</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Previsão de alta (semanas)</label>
                        <input type="text" id="f-previsao" placeholder="Ex: 2 semanas">
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">Avaliação clínica</div>
                <div class="form-grid">
                    <div class="field">
                        <label>Mobilidade</label>
                        <select id="f-mobilidade">
                            <option value="">— Selecione —</option>
                            <option>Acamado</option>
                            <option>Sentado com apoio</option>
                            <option>Sentado sem apoio</option>
                            <option>Em pé com apoio</option>
                            <option>Marcha com suporte</option>
                            <option>Marcha Independente</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Dependência</label>
                        <select id="f-dependencia">
                            <option value="">— Selecione —</option>
                            <option>Independente</option>
                            <option>Dependente parcial</option>
                            <option>Dependente total</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>MRC (escala 0–5)</label>
                        <input type="text" id="f-mrc" placeholder="Ex: 3 ou 3/5">
                    </div>
                    <div class="field">
                        <label>O₂ suplementar</label>
                        <select id="f-o2">
                            <option value="">— Selecione —</option>
                            <option>Sim</option>
                            <option>Não</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Ventilação mecânica</label>
                        <select id="f-vm">
                            <option value="">— Selecione —</option>
                            <option>Não</option>
                            <option>Invasiva</option>
                            <option>Não invasiva</option>
                            <option>VNI</option>
                            <option>CPAP</option>
                            <option>BIPAP</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Via aérea</label>
                        <select id="f-via">
                            <option value="">— Selecione —</option>
                            <option>Pérvea</option>
                            <option>TOT</option>
                            <option>TQT</option>
                            <option>Máscara</option>
                            <option>Cateter nasal</option>
                        </select>
                    </div>
                    <div class="field col-span-2">
                        <label>Dispositivos / observações</label>
                        <textarea id="f-dispositivos" placeholder="Drenos, cateteres, órteses..."></textarea>
                    </div>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn btn-secondary" onclick="limparForm()">Limpar</button>
                <button class="btn btn-primary" id="btnSalvar" onclick="salvarAvaliacao()">Salvar avaliação</button>
            </div>
        </div>

        <!-- PAINEL: HISTÓRICO -->
        <div class="panel" id="tab-historico">
            <div class="hist-controls">
                <input class="hist-search" type="text" id="buscaHist" placeholder="Buscar por paciente ou prontuário..."
                    oninput="filtrarHistorico()">
                <select
                    style="padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:inherit;font-size:13px;outline:none;"
                    id="filtroTipo" onchange="filtrarHistorico()">
                    <option value="">Todos os tipos</option>
                    <option>Avaliação Inicial</option>
                    <option>Reavaliação</option>
                    <option>Alta da fisioterapia</option>
                    <option>Óbito</option>
                    <option>Transferência</option>
                </select>
            </div>
            <div id="listaHist">
                <div class="loading">Carregando...</div>
            </div>
        </div>

    </div>

    <!-- MODAL EDIÇÃO -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Editar avaliação</h3>
                <button class="btn-close" onclick="fecharModal()">✕</button>
            </div>
            <div class="form-grid" id="modalGrid">
                <!-- preenchido via JS -->
            </div>
            <div class="btn-row" style="margin-top:18px;">
                <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
                <button class="btn btn-primary" id="btnSalvarEdit" onclick="salvarEdicao()">Salvar alterações</button>
            </div>
        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        const SUPABASE_URL = 'https://wxtqzqlkpcrmxztwxeix.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4dHF6cWxrcGNybXh6dHd4ZWl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjAzMDQsImV4cCI6MjA5Njk5NjMwNH0.JuaK9WIzMJPGjW6LnF-6yynsLOh5MNjCXYZmaESRZVw';

        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let usuarioAtual = null;
        let perfilAtual = null;
        let todosRegistros = [];
        let editandoId = null;

        // ── INIT ──
        (async () => {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }

            usuarioAtual = session.user;
            const { data: p } = await sb.from('profiles').select('nome,role').eq('id', usuarioAtual.id).single();
            perfilAtual = p;

            if (!p || (p.role !== 'fisioterapeuta' && p.role !== 'fisio')) {
                window.location.href = p?.role === 'gestor' ? 'acesso_gestor.html' : 'index.html';
                return;
            }

            document.getElementById('nomeUsuario').textContent = p.nome || 'Fisioterapeuta';
            document.getElementById('f-data').value = new Date().toISOString().split('T')[0];
            await carregarHistorico();
        })();

        // ── TABS ──
        function trocarTab(tab) {
            document.querySelectorAll('.tab').forEach((t, i) => {
                const ids = ['nova', 'historico'];
                t.classList.toggle('active', ids[i] === tab);
            });
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            if (tab === 'historico') carregarHistorico();
        }

        // ── SALVAR AVALIAÇÃO ──
        async function salvarAvaliacao() {
            const paciente = document.getElementById('f-paciente').value.trim();
            const data = document.getElementById('f-data').value;
            if (!paciente || !data) { toast('Preencha ao menos o nome do paciente e a data.', 'err'); return; }

            const btn = document.getElementById('btnSalvar');
            btn.disabled = true; btn.textContent = 'Salvando...';

            const reg = buildReg();

            const { error } = await sb.from('avaliacoes').insert(reg);
            btn.disabled = false; btn.textContent = 'Salvar avaliação';

            if (error) { toast('Erro ao salvar: ' + error.message, 'err'); return; }
            toast('Avaliação salva com sucesso!', 'ok');
            limparForm();
            await carregarHistorico();
        }

        function buildReg(extra = {}) {
            return {
                fisio_id: usuarioAtual.id,
                fisio_nome: perfilAtual?.nome || '',
                paciente: v('f-paciente'),
                prontuario: v('f-prontuario'),
                posto: v('f-posto'),
                leito: v('f-leito'),
                data_avaliacao: v('f-data') || null,
                tipo: v('f-tipo'),
                mobilidade: v('f-mobilidade'),
                dispositivos: v('f-dispositivos'),
                o2: v('f-o2'),
                vm: v('f-vm'),
                via_aerea: v('f-via'),
                dependencia: v('f-dependencia'),
                mrc: v('f-mrc'),
                status_paciente: v('f-status'),
                previsao: v('f-previsao'),
                ...extra
            };
        }

        function v(id) { return document.getElementById(id)?.value.trim() || ''; }

        function limparForm() {
            ['f-paciente', 'f-prontuario', 'f-posto', 'f-leito', 'f-previsao', 'f-mrc', 'f-dispositivos'].forEach(id => {
                const el = document.getElementById(id); if (el) el.value = '';
            });
            ['f-tipo', 'f-status', 'f-mobilidade', 'f-dependencia', 'f-o2', 'f-vm', 'f-via'].forEach(id => {
                const el = document.getElementById(id); if (el) el.value = '';
            });
            document.getElementById('f-data').value = new Date().toISOString().split('T')[0];
        }

        // ── HISTÓRICO ──
        async function carregarHistorico() {
            const { data, error } = await sb
                .from('avaliacoes')
                .select('*')
                .eq('fisio_id', usuarioAtual.id)
                .order('data_avaliacao', { ascending: false });

            if (error) { document.getElementById('listaHist').innerHTML = '<div class="loading">Erro ao carregar.</div>'; return; }
            todosRegistros = data || [];
            renderHistorico(todosRegistros);
        }

        function filtrarHistorico() {
            const busca = document.getElementById('buscaHist').value.toLowerCase();
            const tipo = document.getElementById('filtroTipo').value;
            const filtrado = todosRegistros.filter(r => {
                const okBusca = !busca || r.paciente?.toLowerCase().includes(busca) || r.prontuario?.toLowerCase().includes(busca);
                const okTipo = !tipo || r.tipo === tipo;
                return okBusca && okTipo;
            });
            renderHistorico(filtrado);
        }

        function renderHistorico(lista) {
            const el = document.getElementById('listaHist');
            if (!lista.length) {
                el.innerHTML = '<div class="empty-state"><div class="ico">📋</div><p>Nenhum registro encontrado.</p></div>';
                return;
            }
            el.innerHTML = lista.map(r => `
    <div class="reg-card">
      <div class="reg-header">
        <div>
          <div class="reg-name">${esc(r.paciente)}</div>
          <div class="reg-meta">Prontuário: ${r.prontuario || '—'} · ${r.posto || '—'} · Leito ${r.leito || '—'}</div>
        </div>
        <div class="reg-meta">${fmtData(r.data_avaliacao)}</div>
      </div>
      <div class="reg-chips">
        ${chip(r.tipo, 'tipo')} ${chip(r.mobilidade, 'mob')} ${chip(r.status_paciente, 'status')}
        ${r.vm && r.vm !== 'Não' ? `<span class="chip orange">VM: ${esc(r.vm)}</span>` : ''}
        ${r.o2 === 'Sim' ? '<span class="chip orange">O₂</span>' : ''}
        ${r.mrc ? `<span class="chip gray">MRC: ${esc(r.mrc)}</span>` : ''}
      </div>
      <div class="reg-actions">
        <button class="btn btn-secondary btn-sm" onclick="abrirEdicao('${r.id}')">✏️ Editar</button>
        <button class="btn btn-danger btn-sm" onclick="excluir('${r.id}')">🗑 Excluir</button>
      </div>
    </div>
  `).join('');
        }

        function chip(val, tipo) {
            if (!val) return '';
            let cls = 'chip';
            if (tipo === 'tipo') {
                if (val.includes('Inicial') || val.includes('Admissão')) cls += ' ';
                else if (val.includes('Alta')) cls += ' green';
                else if (val.includes('Óbito') || val.includes('Obito')) cls += ' pink';
                else cls += ' orange';
            }
            if (tipo === 'status') {
                if (val.toLowerCase().includes('alta')) cls += ' green';
                else if (val.toLowerCase().includes('óbito') || val.toLowerCase().includes('obito')) cls += ' pink';
                else cls += ' ';
            }
            if (tipo === 'mob') {
                if (val.includes('Independente')) cls += ' green';
                else if (val.includes('Acamado')) cls += ' pink';
                else cls += ' orange';
            }
            return `<span class="${cls.trim()}">${esc(val)}</span>`;
        }

        function fmtData(d) {
            if (!d) return '—';
            const [y, m, dia] = d.split('-');
            return `${dia}/${m}/${y}`;
        }

        function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        // ── EDIÇÃO ──
        function abrirEdicao(id) {
            const r = todosRegistros.find(x => x.id === id);
            if (!r) return;
            editandoId = id;

            document.getElementById('modalGrid').innerHTML = `
    <div class="field"><label>Paciente *</label><input type="text" id="e-paciente" value="${esc(r.paciente || '')}"></div>
    <div class="field"><label>Prontuário</label><input type="text" id="e-prontuario" value="${esc(r.prontuario || '')}"></div>
    <div class="field"><label>Posto / Setor</label><input type="text" id="e-posto" value="${esc(r.posto || '')}"></div>
    <div class="field"><label>Leito</label><input type="text" id="e-leito" value="${esc(r.leito || '')}"></div>
    <div class="field"><label>Data *</label><input type="date" id="e-data" value="${r.data_avaliacao || ''}"></div>
    <div class="field"><label>Tipo</label>
      <select id="e-tipo">${['', 'Avaliação Inicial', 'Reavaliação', 'Alta da fisioterapia', 'Óbito', 'Transferência'].map(o => `<option${r.tipo === o ? ' selected' : ''}>${o}</option>`).join('')}</select></div>
    <div class="field"><label>Status</label>
      <select id="e-status">${['', 'Em acompanhamento', 'Alta hospitalar', 'Alta da fisioterapia', 'Óbito', 'Transferência'].map(o => `<option${r.status_paciente === o ? ' selected' : ''}>${o}</option>`).join('')}</select></div>
    <div class="field"><label>Previsão</label><input type="text" id="e-previsao" value="${esc(r.previsao || '')}"></div>
    <div class="field"><label>Mobilidade</label>
      <select id="e-mobilidade">${['', 'Acamado', 'Sentado com apoio', 'Sentado sem apoio', 'Em pé com apoio', 'Marcha com suporte', 'Marcha Independente'].map(o => `<option${r.mobilidade === o ? ' selected' : ''}>${o}</option>`).join('')}</select></div>
    <div class="field"><label>Dependência</label>
      <select id="e-dependencia">${['', 'Independente', 'Dependente parcial', 'Dependente total'].map(o => `<option${r.dependencia === o ? ' selected' : ''}>${o}</option>`).join('')}</select></div>
    <div class="field"><label>MRC</label><input type="text" id="e-mrc" value="${esc(r.mrc || '')}"></div>
    <div class="field"><label>O₂</label>
      <select id="e-o2">${['', 'Sim', 'Não'].map(o => `<option${r.o2 === o ? ' selected' : ''}>${o}</option>`).join('')}</select></div>
    <div class="field"><label>VM</label>
      <select id="e-vm">${['', 'Não', 'Invasiva', 'Não invasiva', 'VNI', 'CPAP', 'BIPAP'].map(o => `<option${r.vm === o ? ' selected' : ''}>${o}</option>`).join('')}</select></div>
    <div class="field"><label>Via aérea</label>
      <select id="e-via">${['', 'Pérvea', 'TOT', 'TQT', 'Máscara', 'Cateter nasal'].map(o => `<option${r.via_aerea === o ? ' selected' : ''}>${o}</option>`).join('')}</select></div>
    <div class="field col-span-2"><label>Dispositivos / obs.</label><textarea id="e-dispositivos">${esc(r.dispositivos || '')}</textarea></div>
  `;

            document.getElementById('modalOverlay').classList.add('show');
        }

        function fecharModal() {
            document.getElementById('modalOverlay').classList.remove('show');
            editandoId = null;
        }

        async function salvarEdicao() {
            if (!editandoId) return;
            const vv = id => document.getElementById(id)?.value.trim() || '';
            const btn = document.getElementById('btnSalvarEdit');
            btn.disabled = true; btn.textContent = 'Salvando...';

            const { error } = await sb.from('avaliacoes').update({
                paciente: vv('e-paciente'),
                prontuario: vv('e-prontuario'),
                posto: vv('e-posto'),
                leito: vv('e-leito'),
                data_avaliacao: vv('e-data') || null,
                tipo: vv('e-tipo'),
                status_paciente: vv('e-status'),
                previsao: vv('e-previsao'),
                mobilidade: vv('e-mobilidade'),
                dependencia: vv('e-dependencia'),
                mrc: vv('e-mrc'),
                o2: vv('e-o2'),
                vm: vv('e-vm'),
                via_aerea: vv('e-via'),
                dispositivos: vv('e-dispositivos'),
            }).eq('id', editandoId);

            btn.disabled = false; btn.textContent = 'Salvar alterações';
            if (error) { toast('Erro ao salvar: ' + error.message, 'err'); return; }
            fecharModal();
            toast('Alterações salvas!', 'ok');
            await carregarHistorico();
        }

        async function excluir(id) {
            if (!confirm('Excluir este registro permanentemente?')) return;
            const { error } = await sb.from('avaliacoes').delete().eq('id', id);
            if (error) { toast('Erro ao excluir.', 'err'); return; }
            toast('Registro excluído.', 'ok');
            await carregarHistorico();
        }

        // ── LOGOUT ──
        async function sair() {
            await sb.auth.signOut();
            window.location.href = 'index.html';
        }

        // ── TOAST ──
        function toast(msg, tipo = 'ok') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast show ' + tipo;
            clearTimeout(toast._t);
            toast._t = setTimeout(() => el.classList.remove('show'), 3500);
        }

        // Fechar modal clicando fora
        document.getElementById('modalOverlay').addEventListener('click', function (e) {
            if (e.target === this) fecharModal();
        });
    </script>
</body>

</html>
