<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yosef — Redefinir Senha</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: linear-gradient(135deg, #0d131f 0%, #151828 50%, #1b1222 100%);
      --surface: rgba(26, 29, 39, 0.55);
      --border: rgba(255, 255, 255, 0.1);
      --accent: #4f8ef7;
      --text: #e8eaf0;
      --text2: #8b90a7;
      --radius: 16px;
      --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.35);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 380px;
    }

    h2 { font-size: 20px; font-weight: 600; margin-bottom: 6px; text-align: center; }
    p { font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 24px; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 7px; }
    .field input {
      width: 100%; padding: 11px 14px; background: rgba(34, 38, 58, 0.5);
      border: 1px solid var(--border); border-radius: 10px; color: var(--text);
      font-family: inherit; font-size: 14px; outline: none; transition: border-color 0.2s;
    }
    .field input:focus { border-color: var(--accent); }

    .btn {
      width: 100%; padding: 12px; margin-top: 12px; background: var(--accent);
      color: #fff; border: none; border-radius: 10px; font-family: inherit;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>

<body>

  <div class="card">
    <h2>Criar Nova Senha</h2>
    <p>Introduza abaixo a sua nova palavra-passe de acesso.</p>

    <div class="field">
      <label>Nova Senha</label>
      <input type="password" id="nova-senha" placeholder="Mínimo 6 caracteres">
    </div>

    <div class="field">
      <label>Confirme a Nova Senha</label>
      <input type="password" id="confirma-senha" placeholder="••••••••">
    </div>

    <button class="btn" id="btnAtualizar" onclick="atualizarSenha()">Atualizar Senha</button>
  </div>

  <script>
    const SUPABASE_URL = 'https://ykevrqzeekhhwlhzaitt.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlrZXZycXplZWtoaHdsaHphaXR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NTgyMjQsImV4cCI6MjA5NzAzNDIyNH0.VuJAa0C2ze2AeZhiFynaYxaUteTDTmxT7RzNwe3DYsY';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function atualizarSenha() {
      const senha = document.getElementById('nova-senha').value;
      const confirma = document.getElementById('confirma-senha').value;
      const btn = document.getElementById('btnAtualizar');

      if (senha.length < 6) {
        alert('A senha precisa de ter pelo menos 6 caracteres.');
        return;
      }
      if (senha !== confirma) {
        alert('As senhas não coincidem!');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'A atualizar...';

      try {
        // Envia o comando de redefinição para o Supabase usando a sessão do Token implícito na URL
        const { data, error } = await sb.auth.updateUser({ password: senha });

        if (error) {
          alert('Erro do Supabase: ' + error.message);
          btn.disabled = false;
          btn.textContent = 'Atualizar Senha';
        } else {
          alert('Senha alterada com sucesso! A redirecionar para o Login...');
          sessionStorage.removeItem('yosef_session_active');
          await sb.auth.signOut();
          window.location.href = 'index.html';
        }
      } catch (err) {
        alert('Erro interno de processamento: ' + err.message);
        btn.disabled = false;
        btn.textContent = 'Atualizar Senha';
      }
    }
  </script>
</body>

</html>
